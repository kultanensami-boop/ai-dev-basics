<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Tuotehallinta</title>
<link rel="stylesheet" href="/static/styles.css">
<script src="/static/script.js" defer></script>

</head>
<body>

    <h1>Tuotelista</h1>
    
    <div id="category-buttons"></div>
    <div id="items-container">
        <!-- Tuotteet tulevat tänne JavaScriptillä -->
    </div>



    <h2>Lisää uusi tuote</h2>

    <form id="add-item-form">
        <input type="text" id="name" placeholder="Nimi" required>
        <input type="text" id="description" placeholder="Kuvaus" required>
     <input type="number" id="price" placeholder="Hinta" step="0.01" required>
     
        <input type="number" id="stock" placeholder="Varastosaldo" required>
        <select id="categorySelect" required>
    <option value="">Valitse kategoria</option>
</select>

    <label for="image" class="file-label">Lisää tuotekuva</label>
<input type="file" id="image" accept="image/*" style="display:none;">
        <button type="submit">Lisää tuote</button>
    </form>

 
</body>
</html>
