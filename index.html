<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Tuotehallinta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Tuotelista</h1>

    <div id="items-container">
        <!-- Tuotteet tulevat tänne JavaScriptillä -->
    </div>

    <h2>Lisää uusi tuote</h2>

    <form id="add-item-form">
        <input type="text" id="name" placeholder="Nimi" required>
        <input type="text" id="description" placeholder="Kuvaus" required>
        <input type="number" id="price" placeholder="Hinta" required>
        <input type="number" id="stock" placeholder="Varastosaldo" required>
        <input type="text" id="category" placeholder="Kategoria" required>
        <label>
            <input type="checkbox" id="in_stock" checked>
            Varastossa
        </label>
        <button type="submit">Lisää tuote</button>
    </form>

    <script src="script.js"></script>
</body>
</html>
